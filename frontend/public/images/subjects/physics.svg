<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <circle cx="200" cy="150" r="130" fill="#ffffff" fill-opacity="0.08"/>

  <!-- atom orbits -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.75" stroke-width="4">
    <ellipse cx="200" cy="150" rx="110" ry="42"/>
    <ellipse cx="200" cy="150" rx="110" ry="42" transform="rotate(60 200 150)"/>
    <ellipse cx="200" cy="150" rx="110" ry="42" transform="rotate(120 200 150)"/>
  </g>

  <!-- nucleus -->
  <circle cx="200" cy="150" r="16" fill="#ffd166"/>
  <circle cx="200" cy="150" r="16" fill="#ffffff" fill-opacity="0.25"/>

  <!-- electrons -->
  <circle cx="310" cy="150" r="9" fill="#ffffff"/>
  <circle cx="140" cy="60" r="8" fill="#ffffff"/>
  <circle cx="260" cy="235" r="8" fill="#ffffff"/>

  <!-- lightning bolt accent -->
  <path d="M85 70 L105 70 L90 110 L108 110 L70 165 L82 118 L64 118 Z" fill="#ffd166"/>
</svg>
